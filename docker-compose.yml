services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gymflow
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gymflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymflow -d gymflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gymflow:password@db:5432/gymflow
      JWT_SECRET: ${JWT_SECRET:-dev_access_secret_change_me_please_32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_me_please_32chars}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      PORT: 4000
      CORS_ORIGIN: http://localhost:3001
      RESERVAGYM_ENABLED: "true"
      RESERVAGYM_URL: ${RESERVAGYM_URL}
      RESERVAGYM_API_KEY: ${RESERVAGYM_API_KEY}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY}
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PUBLIC_API_URL: http://localhost:4000/api/v1
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3001:3000"

volumes:
  pgdata:
